name: integrate
on:
  push:
    branches:
      - main
  pull_request:
jobs:
  rspec:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version:
          - 3.2
          - 3.3
          - 3.4
          - 4.0
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
      - run: bin/setup
      - run: bin/rake appraisal rspec
  rubocop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ruby
          bundler_cache: true
      - run: bin/setup
      - run: bin/rake rubocop
